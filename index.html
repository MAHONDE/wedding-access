<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Wedding Access · Plateforme cérémonie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet"/>
  <script>
  window.WA_CONFIG = {
    demoMode: false,
    apiBase: 'https://wedding-access-production.up.railway.app/api'
  };
  </script>
  <style>
:root {
  --bg:#FAF8F4;--bg2:#F4EEE6;--card:#FFFFFF;
  --accent:#4A78B8;--accent2:#DCEBFF;
  --gold:#C9A84C;--gold2:#E8D5A0;
  --text:#2C2C2C;--text2:#6B6560;--muted:#9B9490;
  --border:#E8E4DC;--shadow:rgba(0,0,0,0.08);
  --radius:12px;
  --font-serif:'Playfair Display',serif;
  --font-sans:'Inter',sans-serif;
  --font-ceremony:'Cormorant Garamond',serif;
  --success:#4A7C59;--danger:#8B3A3A;--warning:#7A5C1A;--info:#2C5F8A;
  --success-bg:#D4EAD9;--danger-bg:#EAD4D4;--warning-bg:#EAE0D4;--info-bg:#D4E0EA;
}
[data-theme="night"] {
  --bg:#0D1B34;--bg2:#13294B;--card:#173D6B;
  --accent:#D4AF37;--accent2:rgba(212,175,55,0.15);
  --gold:#D4AF37;--gold2:#E5C76B;
  --text:#F0EDE8;--text2:#B0A898;--muted:#706A63;
  --border:rgba(212,175,55,0.3);--shadow:rgba(0,0,0,0.3);
  --success:#6AAD80;--danger:#C06060;--warning:#C0961A;--info:#5A8FBF;
  --success-bg:rgba(74,124,89,0.2);--danger-bg:rgba(139,58,58,0.2);--warning-bg:rgba(122,92,26,0.2);--info-bg:rgba(44,95,138,0.2);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:14px;}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden;transition:background .3s,color .3s;}
a{color:inherit;text-decoration:none;}
button{font-family:var(--font-sans);}

/* Boot */
.wa-boot{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);font-family:var(--font-serif);font-size:1.75rem;font-weight:400;color:var(--gold);letter-spacing:.15em;}

/* Layout */
.wa-layout{display:flex;min-height:100dvh;}
.wa-sidebar{width:240px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:200;transition:transform .25s ease;}
.wa-sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:199;display:none;}
.wa-sidebar-header{padding:1.25rem 1.25rem 1rem;border-bottom:1px solid var(--border);}
.wa-sidebar-monogram{display:flex;align-items:center;gap:.75rem;margin-bottom:.625rem;}
.wa-sidebar-titles h2{font-family:var(--font-serif);font-size:1rem;font-weight:500;color:var(--gold);letter-spacing:.06em;line-height:1.2;}
.wa-sidebar-titles p{font-size:11px;color:var(--muted);margin-top:2px;letter-spacing:.04em;}
.wa-nav{flex:1;overflow-y:auto;padding:.5rem .75rem;}
.wa-nav-section{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:.625rem .75rem .25rem;margin-top:.25rem;}
.wa-nav-item{display:flex;align-items:center;gap:.625rem;padding:.55rem .75rem;border-radius:8px;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:background .15s,color .15s;margin-bottom:1px;}
.wa-nav-item:hover{background:var(--border);color:var(--text);}
.wa-nav-item.active{background:var(--gold);color:#fff;}
.wa-nav-item svg,.wa-nav-item .nav-icon{width:16px;height:16px;flex-shrink:0;opacity:.8;}
.wa-nav-item.active .nav-icon{opacity:1;}
.wa-sidebar-footer{padding:.75rem;border-top:1px solid var(--border);}
.wa-sidebar-user{display:flex;align-items:center;gap:.625rem;padding:.5rem .5rem .625rem;font-size:12px;}
.wa-sidebar-user-name{font-weight:500;color:var(--text);line-height:1.3;}
.wa-sidebar-user-role{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}

.wa-main{margin-left:240px;flex:1;min-width:0;display:flex;flex-direction:column;}
.wa-topbar{position:sticky;top:0;z-index:100;background:rgba(250,248,244,.92);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;gap:.75rem;}
[data-theme="night"] .wa-topbar{background:rgba(13,27,52,.92);}
.wa-topbar-menu{display:none;background:none;border:none;cursor:pointer;padding:.375rem;color:var(--text);font-size:1.25rem;}
.wa-topbar-title{font-family:var(--font-serif);font-size:1.125rem;font-weight:500;flex:1;color:var(--text);}
.wa-page{padding:1.5rem;}

/* Cards */
.wa-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;box-shadow:0 1px 4px var(--shadow);}
.wa-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.wa-card-title{font-family:var(--font-serif);font-size:1.1rem;font-weight:500;color:var(--text);}

/* Stats */
.wa-stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1rem;margin-bottom:1.5rem;}
.wa-stat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem 1rem;text-align:center;box-shadow:0 1px 4px var(--shadow);}
.wa-stat-value{font-family:var(--font-serif);font-size:2.25rem;font-weight:400;color:var(--gold);line-height:1;}
.wa-stat-label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-top:.375rem;}

/* Buttons */
.wa-btn{display:inline-flex;align-items:center;justify-content:center;gap:.4rem;padding:.45rem .9rem;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .15s;white-space:nowrap;line-height:1.4;}
.wa-btn:disabled{opacity:.5;cursor:not-allowed;}
.wa-btn-primary,.wa-btn{background:var(--gold);color:#fff;border-color:var(--gold);}
.wa-btn:hover:not(:disabled){filter:brightness(.92);}
.wa-btn-secondary{background:transparent;color:var(--text);border-color:var(--border);}
.wa-btn-secondary:hover:not(:disabled){background:var(--bg2);}
.wa-btn-ghost{background:transparent;color:var(--text2);border-color:transparent;}
.wa-btn-ghost:hover:not(:disabled){background:var(--border);color:var(--text);}
.wa-btn-danger{background:var(--danger);color:#fff;border-color:var(--danger);}
.wa-btn-sm{padding:.3rem .65rem;font-size:12px;}
.wa-btn-icon{padding:.35rem;background:transparent;border:none;cursor:pointer;color:var(--text2);border-radius:6px;transition:background .15s;}
.wa-btn-icon:hover{background:var(--border);color:var(--text);}

/* Inputs */
.wa-input,.wa-select{width:100%;padding:.45rem .75rem;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--font-sans);background:var(--bg);color:var(--text);outline:none;transition:border-color .15s;}
.wa-input:focus,.wa-select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,.15);}
.wa-label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);margin-bottom:.35rem;}
.wa-form-group{margin-bottom:.875rem;}
.wa-form-row{display:grid;gap:.75rem;}
.wa-form-row-2{grid-template-columns:1fr 1fr;}
.wa-form-error{font-size:12px;color:var(--danger);margin-top:.3rem;}

/* Table */
.wa-table-wrap{overflow-x:auto;}
.wa-table{width:100%;border-collapse:collapse;font-size:13px;}
.wa-table th{text-align:left;padding:.6rem .875rem;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap;background:var(--bg2);}
.wa-table td{padding:.7rem .875rem;border-bottom:1px solid var(--border);vertical-align:middle;}
.wa-table tr:last-child td{border-bottom:none;}
.wa-table tbody tr:hover td{background:var(--bg2);}

/* Badges */
.wa-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;white-space:nowrap;letter-spacing:.02em;}
.wa-badge-success{background:var(--success-bg);color:var(--success);}
.wa-badge-danger{background:var(--danger-bg);color:var(--danger);}
.wa-badge-warning{background:var(--warning-bg);color:var(--warning);}
.wa-badge-info{background:var(--info-bg);color:var(--info);}
.wa-badge-muted{background:var(--border);color:var(--muted);}
.wa-badge-gold{background:rgba(201,168,76,.18);color:var(--gold);}

/* Modal */
.wa-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:1rem;}
.wa-modal{background:var(--card);border-radius:16px;padding:1.5rem;width:100%;max-width:500px;max-height:90dvh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.wa-modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;}
.wa-modal-title{font-family:var(--font-serif);font-size:1.2rem;font-weight:500;}
.wa-modal-close{background:none;border:none;cursor:pointer;font-size:1.25rem;color:var(--muted);padding:.25rem;line-height:1;}
.wa-modal-close:hover{color:var(--text);}
.wa-modal-footer{display:flex;gap:.625rem;justify-content:flex-end;margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--border);}

/* Toast */
.wa-toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;padding:.75rem 1.25rem;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.2);animation:toastIn .2s ease;max-width:340px;}
.wa-toast-success{background:#2d6a4f;color:#fff;}
.wa-toast-error{background:var(--danger);color:#fff;}
.wa-toast-info{background:var(--info);color:#fff;}
@keyframes toastIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* Scanner */
.wa-scanner-wrap{display:flex;flex-direction:column;align-items:center;gap:1.25rem;max-width:480px;margin:0 auto;}
.wa-scanner-viewport{width:100%;aspect-ratio:1;border-radius:16px;overflow:hidden;background:#000;position:relative;}
.wa-scanner-viewport video{width:100%;height:100%;object-fit:cover;display:block;}
.wa-scanner-frame-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.wa-scanner-frame{width:62%;aspect-ratio:1;border:2px solid var(--gold);border-radius:12px;box-shadow:0 0 0 9999px rgba(0,0,0,.5);}
.wa-scan-result{width:100%;border-radius:12px;padding:1.25rem;border:1px solid;}
.wa-scan-valid{background:var(--success-bg);border-color:var(--success);color:var(--success);}
.wa-scan-invalid{background:var(--danger-bg);border-color:var(--danger);color:var(--danger);}
.wa-scan-used{background:var(--warning-bg);border-color:var(--warning);color:var(--warning);}
.wa-scan-result h3{font-family:var(--font-serif);font-size:1.15rem;margin-bottom:.4rem;}
.wa-scan-result p{font-size:13px;line-height:1.6;}

/* Login */
.wa-login-wrap{min-height:100dvh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:1.5rem;}
.wa-login-box{width:100%;max-width:400px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2.5rem;box-shadow:0 8px 40px var(--shadow);}
.wa-login-logo{text-align:center;margin-bottom:2rem;}
.wa-login-logo h1{font-family:var(--font-serif);font-size:1.875rem;font-weight:500;color:var(--gold);letter-spacing:.08em;margin-top:.75rem;}
.wa-login-logo p{font-size:12px;color:var(--muted);letter-spacing:.05em;margin-top:.3rem;}

/* Empty */
.wa-empty{text-align:center;padding:3rem 1rem;color:var(--muted);font-size:13px;}
.wa-empty-icon{font-size:2rem;margin-bottom:.75rem;opacity:.4;}

/* Loader */
.wa-loader{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Filter bar */
.wa-filter-bar{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;margin-bottom:1rem;}
.wa-filter-bar .wa-input,.wa-filter-bar .wa-select{width:auto;}

/* Tab */
.wa-tabs{display:flex;gap:2px;background:var(--bg2);border-radius:10px;padding:3px;margin-bottom:1.25rem;width:fit-content;}
.wa-tab{padding:.4rem 1rem;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text2);transition:all .15s;}
.wa-tab.active{background:var(--card);color:var(--text);box-shadow:0 1px 4px var(--shadow);}

/* Upload zone */
.wa-upload-zone{border:2px dashed var(--border);border-radius:12px;padding:2rem;text-align:center;cursor:pointer;transition:border-color .15s;color:var(--muted);font-size:13px;}
.wa-upload-zone:hover{border-color:var(--gold);}

/* Responsive */
@media(max-width:768px){
  .wa-sidebar{transform:translateX(-100%);}
  .wa-sidebar.open{transform:translateX(0);}
  .wa-sidebar-overlay{display:block;}
  .wa-main{margin-left:0;}
  .wa-topbar-menu{display:flex;}
  .wa-page{padding:1rem;}
  .wa-stat-grid{grid-template-columns:repeat(2,1fr);}
  .wa-form-row-2{grid-template-columns:1fr;}
  .wa-modal{margin:0;border-radius:16px 16px 0 0;position:fixed;bottom:0;left:0;right:0;max-width:none;}
  .wa-modal-overlay{align-items:flex-end;padding:0;}
  .wa-table th,.wa-table td{padding:.5rem .625rem;}
}
@media(max-width:480px){
  .wa-stat-grid{grid-template-columns:1fr 1fr;}
  .wa-filter-bar{flex-direction:column;align-items:stretch;}
  .wa-filter-bar .wa-input,.wa-filter-bar .wa-select{width:100%;}
}

/* Utilities */
.wa-flex{display:flex;align-items:center;}
.wa-flex-between{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;}
.wa-gap-xs{gap:.375rem;}
.wa-gap-sm{gap:.5rem;}
.wa-gap{gap:.75rem;}
.wa-gap-lg{gap:1rem;}
.wa-mb-sm{margin-bottom:.75rem;}
.wa-mb{margin-bottom:1rem;}
.wa-mb-lg{margin-bottom:1.5rem;}
.wa-text-muted{color:var(--muted);}
.wa-text-gold{color:var(--gold);}
.wa-text-serif{font-family:var(--font-serif);}
.wa-text-sm{font-size:12px;}
.wa-text-xs{font-size:11px;}
.wa-w-full{width:100%;}
  </style>
</head>
<body>
<div id="root"><div class="wa-boot">Wedding Access</div></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;
const CFG = window.WA_CONFIG || { demoMode: false, apiBase: '' };

/* ── Token management ─────────────────────────────── */
let _token = localStorage.getItem('wa_token') || null;
function setToken(t) { _token = t; t ? localStorage.setItem('wa_token', t) : localStorage.removeItem('wa_token'); }

async function req(method, path, body, isFormData = false) {
  const h = {};
  if (!isFormData) h['Content-Type'] = 'application/json';
  if (_token) h['Authorization'] = 'Bearer ' + _token;
  const res = await fetch(CFG.apiBase + path, {
    method,
    headers: h,
    body: isFormData ? body : (body !== undefined ? JSON.stringify(body) : undefined)
  });
  if (res.status === 401) { setToken(null); window.dispatchEvent(new Event('wa:logout')); throw new Error('Session expirée'); }
  const txt = await res.text();
  let d; try { d = JSON.parse(txt); } catch { d = txt; }
  if (!res.ok) throw new Error(d?.message || d || res.statusText);
  return d;
}

const api = {
  auth: {
    login: (email, pw) => req('POST', '/auth/login', { email, password: pw }).then(r => { setToken(r.access_token); return r; }),
    me: () => req('GET', '/auth/me'),
    logout: () => setToken(null),
  },
  ceremonies: { list: () => req('GET', '/ceremonies') },
  guests: {
    list: (cId, q) => req('GET', `/guests?ceremonyId=${cId||''}${q ? '&q='+encodeURIComponent(q) : ''}`),
    stats: (cId) => req('GET', `/guests/stats?ceremonyId=${cId||''}`),
    get: (id) => req('GET', `/guests/${id}`),
    create: (d) => req('POST', '/guests', d),
    update: (id, d) => req('PUT', `/guests/${id}`, d),
    delete: (id) => req('DELETE', `/guests/${id}`),
  },
  qr: {
    generate: (guestId) => req('POST', `/qr/${guestId}`),
    regenerate: (id) => req('POST', `/qr/${id}/regenerate`),
    disable: (id) => req('PATCH', `/qr/${id}/disable`),
  },
  invitations: {
    generate: (guestId) => req('POST', `/invitations/${guestId}`),
    generateBulk: (ceremonyId) => req('POST', '/invitations/bulk', { ceremonyId }),
    downloadUrl: (id) => `${CFG.apiBase}/invitations/${id}/download`,
    updateStatus: (id, status) => req('PATCH', `/invitations/${id}/status`, { status }),
    regenerate: (guestId) => req('POST', `/invitations/${guestId}/regenerate`),
  },
  templates: {
    get: (cId) => req('GET', `/templates/${cId}`),
    upload: (cId, formData) => req('POST', `/templates/${cId}`, formData, true),
    update: (cId, d) => req('PUT', `/templates/${cId}`, d),
    setQrZone: (cId, zone) => req('POST', `/templates/${cId}/qr-zone`, zone),
    delete: (cId) => req('DELETE', `/templates/${cId}`),
  },
  branding: {
    get: () => req('GET', '/branding'),
    update: (d) => req('PATCH', '/branding', d),
    uploadMonogram: (fd) => req('POST', '/branding/monogram', fd, true),
    deleteMonogram: () => req('DELETE', '/branding/monogram'),
    uploadLogo: (fd) => req('POST', '/branding/logo', fd, true),
    deleteLogo: () => req('DELETE', '/branding/logo'),
  },
  seatingPlans: {
    list: (cId) => req('GET', `/seating-plans?ceremonyId=${cId||''}`),
    create: (d) => req('POST', '/seating-plans', d),
    update: (id, d) => req('PUT', `/seating-plans/${id}`, d),
    delete: (id) => req('DELETE', `/seating-plans/${id}`),
    generatePdf: (id) => req('POST', `/seating-plans/${id}/generate-pdf`),
    downloadPdfUrl: (id) => `${CFG.apiBase}/seating-plans/${id}/download-pdf`,
  },
  tables: {
    list: (cId) => req('GET', `/seating?ceremonyId=${cId||''}`),
    create: (d) => req('POST', '/seating', d),
    update: (id, d) => req('PUT', `/seating/${id}`, d),
    delete: (id) => req('DELETE', `/seating/${id}`),
    assign: (guestId, tableId) => req('PATCH', '/seating/assign', { guestId, tableId }),
  },
  scans: {
    verify: (token, di) => req('POST', '/scans/verify', { token, deviceInfo: di }),
    markEntry: (token, di) => req('POST', '/scans/mark-entry', { token, deviceInfo: di }),
    history: (cId, page) => req('GET', `/scans/history?ceremonyId=${cId||''}&page=${page||1}`),
  },
  stats: { live: (cId) => req('GET', `/stats/live?ceremonyId=${cId||''}`) },
  users: {
    list: () => req('GET', '/users'),
    create: (d) => req('POST', '/users', d),
    update: (id, d) => req('PUT', `/users/${id}`, d),
    delete: (id) => req('DELETE', `/users/${id}`),
  },
};

/* ── Theme ─────────────────────────────────────── */
function getAutoTheme() {
  const h = new Date().getHours(), m = new Date().getMinutes();
  return (h > 17 || (h === 17 && m >= 30)) ? 'night' : 'day';
}
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t === 'night' ? 'night' : '');
}

/* ── Helpers ─────────────────────────────────── */
const CEREMONY_NAMES = { VIN_HONNEUR: "Vin d'honneur", DINER: 'Dîner' };
const ROLE_LABELS = {
  SUPER_ADMIN: 'Super Admin',
  ADMIN_VIN_HONNEUR: "Admin Vin d'honneur",
  ADMIN_DINER: 'Admin Dîner',
  AGENT_VIN_HONNEUR: "Agent Vin d'honneur",
  AGENT_DINER: 'Agent Dîner',
};
const INV_STATUS = {
  NOT_SENT: ['wa-badge wa-badge-muted', 'Non envoyée'],
  GENERATED: ['wa-badge wa-badge-success', 'Générée'],
  SENT_WHATSAPP: ['wa-badge wa-badge-success', 'WhatsApp'],
  SENT_BLUETOOTH: ['wa-badge wa-badge-info', 'Bluetooth'],
  OBSOLETE: ['wa-badge wa-badge-danger', 'Obsolète'],
};

function CeremonyBadge({ type }) {
  const name = CEREMONY_NAMES[type] || type;
  const cls = type === 'DINER' ? 'wa-badge wa-badge-info' : 'wa-badge wa-badge-gold';
  return <span className={cls}>{name}</span>;
}

function StatusBadge({ status }) {
  const map = {
    NOT_ARRIVED: ['wa-badge wa-badge-muted', 'En attente'],
    ARRIVED: ['wa-badge wa-badge-success', 'Arrivé'],
    VALID: ['wa-badge wa-badge-success', 'Valide'],
    INVALID: ['wa-badge wa-badge-danger', 'Invalide'],
    ALREADY_USED: ['wa-badge wa-badge-warning', 'Déjà utilisé'],
    WRONG_CEREMONY: ['wa-badge wa-badge-danger', 'Mauvaise cérémonie'],
    INDIVIDUAL: ['wa-badge wa-badge-muted', 'Individuel'],
    COUPLE: ['wa-badge wa-badge-gold', 'Couple'],
    ...Object.fromEntries(Object.entries(INV_STATUS)),
  };
  const [cls, label] = map[status] || ['wa-badge wa-badge-muted', status || '—'];
  return <span className={cls}>{label}</span>;
}

function WeddingMonogram({ size = 52 }) {
  return (
    <div style={{
      width: size, height: size, borderRadius: '50%',
      border: '1.5px solid var(--gold)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: 'var(--font-ceremony)', fontSize: size * 0.27,
      color: 'var(--gold)', letterSpacing: '0.08em', flexShrink: 0,
    }}>M&J</div>
  );
}

function Modal({ title, onClose, children, footer }) {
  useEffect(() => {
    const esc = e => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', esc);
    return () => document.removeEventListener('keydown', esc);
  }, [onClose]);
  return (
    <div className="wa-modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="wa-modal">
        <div className="wa-modal-header">
          <span className="wa-modal-title">{title}</span>
          <button className="wa-modal-close" onClick={onClose}>×</button>
        </div>
        {children}
        {footer && <div className="wa-modal-footer">{footer}</div>}
      </div>
    </div>
  );
}

function ConfirmModal({ title, message, onConfirm, onClose, danger }) {
  const [busy, setBusy] = useState(false);
  const run = async () => { setBusy(true); try { await onConfirm(); onClose(); } catch {} finally { setBusy(false); } };
  return (
    <Modal title={title} onClose={onClose} footer={
      <>
        <button className="wa-btn wa-btn-secondary" onClick={onClose}>Annuler</button>
        <button className={`wa-btn ${danger ? 'wa-btn-danger' : ''}`} onClick={run} disabled={busy}>{busy ? 'Traitement…' : 'Confirmer'}</button>
      </>
    }>{message}</Modal>
  );
}

function GuestModal({ guest, ceremonies, onClose, onSaved }) {
  const editing = !!guest?.id;
  const [form, setForm] = useState({
    primaryName: guest?.primaryName || '',
    companionName: guest?.companionName || '',
    type: guest?.type || 'INDIVIDUAL',
    ceremonyId: guest?.ceremonyId || (ceremonies[0]?.id || ''),
    email: guest?.email || '',
    phone: guest?.phone || '',
  });
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  async function submit(ev) {
    ev.preventDefault(); setErr(''); setBusy(true);
    try {
      if (editing) await api.guests.update(guest.id, form);
      else await api.guests.create(form);
      onSaved();
    } catch (e) { setErr(e.message); }
    finally { setBusy(false); }
  }

  return (
    <Modal title={editing ? 'Modifier l\'invité' : 'Ajouter un invité'} onClose={onClose}
      footer={<>
        <button className="wa-btn wa-btn-secondary" onClick={onClose} type="button">Annuler</button>
        <button className="wa-btn" form="guest-form" type="submit" disabled={busy}>{busy ? 'Enregistrement…' : editing ? 'Enregistrer' : 'Ajouter'}</button>
      </>}>
      <form id="guest-form" onSubmit={submit}>
        <div className="wa-form-group">
          <label className="wa-label">Nom principal *</label>
          <input className="wa-input" value={form.primaryName} onChange={e => set('primaryName', e.target.value)} required placeholder="Nom de l'invité" />
        </div>
        <div className="wa-form-group">
          <label className="wa-label">Type</label>
          <select className="wa-select" value={form.type} onChange={e => set('type', e.target.value)}>
            <option value="INDIVIDUAL">Individuel</option>
            <option value="COUPLE">Couple</option>
          </select>
        </div>
        {form.type === 'COUPLE' && (
          <div className="wa-form-group">
            <label className="wa-label">Nom du/de la partenaire</label>
            <input className="wa-input" value={form.companionName} onChange={e => set('companionName', e.target.value)} placeholder="Nom accompagnateur" />
          </div>
        )}
        <div className="wa-form-group">
          <label className="wa-label">Cérémonie</label>
          <select className="wa-select" value={form.ceremonyId} onChange={e => set('ceremonyId', e.target.value)}>
            {ceremonies.map(c => <option key={c.id} value={c.id}>{c.name || CEREMONY_NAMES[c.type] || c.type}</option>)}
          </select>
        </div>
        <div className="wa-form-row wa-form-row-2">
          <div className="wa-form-group" style={{ margin: 0 }}>
            <label className="wa-label">E-mail</label>
            <input className="wa-input" type="email" value={form.email} onChange={e => set('email', e.target.value)} />
          </div>
          <div className="wa-form-group" style={{ margin: 0 }}>
            <label className="wa-label">Téléphone</label>
            <input className="wa-input" type="tel" value={form.phone} onChange={e => set('phone', e.target.value)} />
          </div>
        </div>
        {err && <div className="wa-form-error" style={{ marginTop: '.5rem' }}>{err}</div>}
      </form>
    </Modal>
  );
}

function GuestsScreen({ user, ceremonies, showToast }) {
  const [guests, setGuests] = useState([]);
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState('');
  const [cFilter, setCFilter] = useState(user.role === 'SUPER_ADMIN' ? '' : (user.ceremonyId || ''));
  const [showAdd, setShowAdd] = useState(false);
  const [editGuest, setEditGuest] = useState(null);
  const [delGuest, setDelGuest] = useState(null);
  const [stats, setStats] = useState(null);
  const debRef = useRef(null);

  const load = useCallback((q = search, cId = cFilter) => {
    setLoading(true);
    Promise.all([
      api.guests.list(cId, q),
      api.guests.stats(cId),
    ]).then(([g, s]) => { setGuests(g || []); setStats(s); }).catch(() => {}).finally(() => setLoading(false));
  }, [search, cFilter]);

  useEffect(() => { load(); }, []);

  const handleSearch = v => {
    setSearch(v);
    clearTimeout(debRef.current);
    debRef.current = setTimeout(() => load(v, cFilter), 350);
  };

  const handleCFilter = v => { setCFilter(v); load(search, v); };

  const handleDelete = async () => {
    await api.guests.delete(delGuest.id);
    showToast('Invité supprimé', 'success');
    load();
  };

  const handleGenerateQR = async (g) => {
    try {
      await (g.qrCode ? api.qr.regenerate(g.id) : api.qr.generate(g.id));
      showToast('QR code généré', 'success');
      load();
    } catch (e) { showToast(e.message, 'error'); }
  };

  const getCeremonyName = (cId) => {
    const c = ceremonies.find(c => c.id === cId);
    return c ? (c.name || CEREMONY_NAMES[c.type] || c.type) : cId;
  };

  const isSA = user.role === 'SUPER_ADMIN';

  return (
    <div>
      {(showAdd || editGuest) && (
        <GuestModal
          guest={editGuest}
          ceremonies={ceremonies}
          onClose={() => { setShowAdd(false); setEditGuest(null); }}
          onSaved={() => { setShowAdd(false); setEditGuest(null); showToast('Invité enregistré', 'success'); load(); }}
        />
      )}
      {delGuest && (
        <ConfirmModal
          title="Supprimer l'invité"
          message={`Supprimer "${delGuest.primaryName}" ? Cette action est irréversible.`}
          danger onConfirm={handleDelete}
          onClose={() => setDelGuest(null)}
        />
      )}

      {stats && (
        <div className="wa-stat-grid">
          <div className="wa-stat"><div className="wa-stat-value">{stats.total ?? '—'}</div><div className="wa-stat-label">Total</div></div>
          <div className="wa-stat"><div className="wa-stat-value">{stats.individual ?? stats.individuals ?? '—'}</div><div className="wa-stat-label">Individuels</div></div>
          <div className="wa-stat"><div className="wa-stat-value">{stats.couples ?? '—'}</div><div className="wa-stat-label">Couples</div></div>
          <div className="wa-stat"><div className="wa-stat-value" style={{ color: 'var(--success)' }}>{stats.arrived ?? '—'}</div><div className="wa-stat-label">Arrivés</div></div>
          {stats.numberOfSeats !== undefined && <div className="wa-stat"><div className="wa-stat-value">{stats.numberOfSeats}</div><div className="wa-stat-label">Sièges</div></div>}
        </div>
      )}

      <div className="wa-flex-between wa-mb-sm">
        <div className="wa-filter-bar" style={{ margin: 0 }}>
          {isSA && ceremonies.length > 0 && (
            <select className="wa-select" style={{ width: 'auto', minWidth: '160px' }} value={cFilter} onChange={e => handleCFilter(e.target.value)}>
              <option value="">Toutes les cérémonies</option>
              {ceremonies.map(c => <option key={c.id} value={c.id}>{c.name || CEREMONY_NAMES[c.type] || c.type}</option>)}
            </select>
          )}
          <input className="wa-input" style={{ minWidth: '200px' }} placeholder="Rechercher…" value={search} onChange={e => handleSearch(e.target.value)} />
        </div>
        <button className="wa-btn" onClick={() => setShowAdd(true)}>+ Ajouter</button>
      </div>

      <div className="wa-card" style={{ padding: 0, overflow: 'hidden' }}>
        <div className="wa-table-wrap">
          <table className="wa-table">
            <thead><tr>
              <th>Nom principal</th>
              <th>Accompagnateur</th>
              <th>Type</th>
              {isSA && <th>Cérémonie</th>}
              <th>Table</th>
              <th>Statut</th>
              <th>QR</th>
              <th>Actions</th>
            </tr></thead>
            <tbody>
              {loading && <tr><td colSpan="8" style={{ textAlign: 'center', padding: '2rem', color: 'var(--muted)' }}><div className="wa-loader" style={{ margin: '0 auto' }}/></td></tr>}
              {!loading && guests.length === 0 && <tr><td colSpan="8"><div className="wa-empty"><div className="wa-empty-icon">👥</div>Aucun invité trouvé</div></td></tr>}
              {guests.map(g => (
                <tr key={g.id}>
                  <td style={{ fontWeight: 500 }}>{g.primaryName}</td>
                  <td>{g.companionName || <span className="wa-text-muted">—</span>}</td>
                  <td><StatusBadge status={g.type} /></td>
                  {isSA && <td><CeremonyBadge type={g.ceremonyType || (ceremonies.find(c => c.id === g.ceremonyId)?.type)} /></td>}
                  <td>{g.tableName || g.tableNumber || <span className="wa-text-muted">—</span>}</td>
                  <td><StatusBadge status={g.entryStatus} /></td>
                  <td>{g.qrCode || g.qrToken ? <span className="wa-badge wa-badge-success">✓ Actif</span> : <span className="wa-badge wa-badge-muted">—</span>}</td>
                  <td style={{ whiteSpace: 'nowrap' }}>
                    <button className="wa-btn wa-btn-ghost wa-btn-sm" onClick={() => setEditGuest(g)}>Modifier</button>
                    <button className="wa-btn wa-btn-ghost wa-btn-sm" style={{ marginLeft: '.25rem' }} onClick={() => handleGenerateQR(g)}>QR</button>
                    <button className="wa-btn wa-btn-ghost wa-btn-sm" style={{ marginLeft: '.25rem', color: 'var(--danger)' }} onClick={() => setDelGuest(g)}>×</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ── TEMPLATES ──────────────────────────────────── */
function TemplatesScreen({ user, ceremonies, showToast }) {
  const [templates, setTemplates] = useState({});
  const [loading, setLoading] = useState(true);
  const [uploading, setUploading] = useState({});

  useEffect(() => {
    const loads = ceremonies.map(c =>
      api.templates.get(c.id).then(t => ({ cId: c.id, t })).catch(() => ({ cId: c.id, t: null }))
    );
    Promise.all(loads).then(results => {
      const map = {};
      results.forEach(({ cId, t }) => { map[cId] = t; });
      setTemplates(map);
    }).finally(() => setLoading(false));
  }, [ceremonies.length]);

  const handleUpload = async (cId, file) => {
    setUploading(u => ({ ...u, [cId]: true }));
    try {
      const fd = new FormData(); fd.append('file', file);
      await api.templates.upload(cId, fd);
      showToast('Modèle uploadé', 'success');
      const t = await api.templates.get(cId).catch(() => null);
      setTemplates(prev => ({ ...prev, [cId]: t }));
    } catch (e) { showToast(e.message, 'error'); }
    finally { setUploading(u => ({ ...u, [cId]: false })); }
  };

  const handleDelete = async (cId) => {
    try {
      await api.templates.delete(cId);
      showToast('Modèle supprimé', 'success');
      setTemplates(prev => ({ ...prev, [cId]: null }));
    } catch (e) { showToast(e.message, 'error'); }
  };

  if (loading) return <div className="wa-empty"><div className="wa-loader" style={{ margin: '0 auto' }}/></div>;

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: '1.25rem' }}>
      {ceremonies.map(c => {
        const tpl = templates[c.id];
        return (
          <div key={c.id} className="wa-card">
            <div className="wa-card-header">
              <div className="wa-card-title">{c.name || CEREMONY_NAMES[c.type] || c.type}</div>
              <CeremonyBadge type={c.type} />
            </div>
            {tpl ? (
              <div>
                <p className="wa-text-sm wa-text-muted" style={{ marginBottom: '.75rem' }}>Modèle actif : <strong style={{ color: 'var(--text)' }}>{tpl.filename || tpl.name || 'Fichier uploadé'}</strong></p>
                {tpl.previewUrl && <img src={tpl.previewUrl} alt="preview" style={{ maxWidth: '100%', maxHeight: '200px', borderRadius: '8px', marginBottom: '.75rem', border: '1px solid var(--border)' }} />}
                <div style={{ display: 'flex', gap: '.5rem', flexWrap: 'wrap' }}>
                  <label className="wa-btn wa-btn-secondary wa-btn-sm" style={{ cursor: 'pointer' }}>
                    Remplacer
                    <input type="file" accept=".pdf,.png,.jpg" style={{ display: 'none' }} onChange={e => e.target.files[0] && handleUpload(c.id, e.target.files[0])} />
                  </label>
                  <button className="wa-btn wa-btn-ghost wa-btn-sm" style={{ color: 'var(--danger)' }} onClick={() => handleDelete(c.id)}>Supprimer</button>
                </div>
              </div>
            ) : (
              <label className="wa-upload-zone" style={{ cursor: 'pointer' }}>
                <div style={{ fontSize: '2rem', marginBottom: '.5rem' }}>📄</div>
                <div style={{ fontWeight: 500, marginBottom: '.25rem' }}>{uploading[c.id] ? 'Upload en cours…' : 'Glisser-déposer ou cliquer'}</div>
                <div className="wa-text-xs wa-text-muted">PDF, PNG ou JPG acceptés</div>
                <input type="file" accept=".pdf,.png,.jpg" style={{ display: 'none' }} onChange={e => e.target.files[0] && handleUpload(c.id, e.target.files[0])} disabled={uploading[c.id]} />
              </label>
            )}
          </div>
        );
      })}
      {ceremonies.length === 0 && <div className="wa-empty">Aucune cérémonie configurée</div>}
    </div>
  );
}

function TableModal({ table, ceremonyId, ceremonies, onClose, onSaved }) {
  const editing = !!table?.id;
  const [form, setForm] = useState({ name: table?.name || '', number: table?.number || '', capacity: table?.capacity || '', ceremonyId: table?.ceremonyId || ceremonyId || (ceremonies[0]?.id || '') });
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  async function submit(ev) {
    ev.preventDefault(); setErr(''); setBusy(true);
    try {
      if (editing) await api.tables.update(table.id, form);
      else await api.tables.create(form);
      onSaved();
    } catch (e) { setErr(e.message); }
    finally { setBusy(false); }
  }

  return (
    <Modal title={editing ? 'Modifier la table' : 'Nouvelle table'} onClose={onClose}
      footer={<>
        <button className="wa-btn wa-btn-secondary" onClick={onClose} type="button">Annuler</button>
        <button className="wa-btn" form="table-form" type="submit" disabled={busy}>{busy ? '…' : editing ? 'Enregistrer' : 'Créer'}</button>
      </>}>
      <form id="table-form" onSubmit={submit}>
        <div className="wa-form-row wa-form-row-2">
          <div className="wa-form-group" style={{ margin: 0 }}>
            <label className="wa-label">Numéro</label>
            <input className="wa-input" value={form.number} onChange={e => set('number', e.target.value)} required placeholder="1" />
          </div>
          <div className="wa-form-group" style={{ margin: 0 }}>

            <input className="wa-input" type="number" min="1" value={form.capacity} onChange={e => set('capacity', e.target.value)} required placeholder="8" />

        </div>
        <div className="wa-form-group" style={{ marginTop: '.75rem' }}>

/* ── SCANNER ────────────────────────────────────── */
function ScannerScreen({ user, showToast }) {
  const videoRef = useRef(null);
  const canvasRef = useRef(null);
  const streamRef = useRef(null);
  const rafRef = useRef(null);
  const [cameraOn, setCameraOn] = useState(false);
  const [manual, setManual] = useState('');
  const [result, setResult] = useState(null); // null | { state, guest, message }
  const [loading, setLoading] = useState(false);

  const stopCamera = useCallback(() => {
    cancelAnimationFrame(rafRef.current);
    streamRef.current?.getTracks().forEach(t => t.stop());
    streamRef.current = null;
    if (videoRef.current) videoRef.current.srcObject = null;
    setCameraOn(false);
  }, []);

  useEffect(() => () => stopCamera(), [stopCamera]);

  const startCamera = async () => {
    setResult(null);
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } } });
      streamRef.current = stream;
      if (videoRef.current) { videoRef.current.srcObject = stream; await videoRef.current.play(); }
      setCameraOn(true);
      tickScan();
    } catch { showToast('Caméra inaccessible — utilisez la saisie manuelle', 'error'); }
  };

  const tickScan = () => {
    rafRef.current = requestAnimationFrame(async () => {
      if (!videoRef.current || !streamRef.current) return;
      const vid = videoRef.current;
      if (vid.readyState < 2) { tickScan(); return; }
      // Try BarcodeDetector first
      if ('BarcodeDetector' in window) {
        try {
          const det = new window.BarcodeDetector({ formats: ['qr_code'] });
          const codes = await det.detect(vid);
          if (codes.length > 0) { stopCamera(); handleToken(codes[0].rawValue); return; }
        } catch {}
      } else {
        // jsQR fallback
        try {
          const c = canvasRef.current;
          if (c) {
            c.width = vid.videoWidth; c.height = vid.videoHeight;
            const ctx = c.getContext('2d');
            ctx.drawImage(vid, 0, 0);
            const imgData = ctx.getImageData(0, 0, c.width, c.height);
            if (window.jsQR) {
              const code = window.jsQR(imgData.data, imgData.width, imgData.height);
              if (code) { stopCamera(); handleToken(code.data); return; }
            }
          }
        } catch {}
      }
      tickScan();
    });
  };

  const handleToken = async (token) => {
    setLoading(true); setResult(null);
    try {
      const data = await api.scans.verify(token, navigator.userAgent);
      setResult({ state: 'verify', token, guest: data.guest, message: data.message, rawData: data });
    } catch (e) {
      setResult({ state: 'invalid', message: e.message || 'QR code invalide' });
    } finally { setLoading(false); }
  };

  const confirmEntry = async () => {
    if (!result?.token) return;
    setLoading(true);
    try {
      await api.scans.markEntry(result.token, navigator.userAgent);
      setResult(r => ({ ...r, state: 'done' }));
    } catch (e) {
      setResult(r => ({ ...r, state: 'invalid', message: e.message }));
    } finally { setLoading(false); }
  };

  const reset = () => { setResult(null); setManual(''); };

  const cerName = user.role?.includes('VIN') ? "Vin d'honneur" : user.role?.includes('DINER') ? 'Dîner' : 'Cérémonie';

  return (
    <div className="wa-scanner-wrap">
      <div style={{ textAlign: 'center', width: '100%' }}>
        <h2 style={{ fontFamily: 'var(--font-serif)', fontSize: '1.5rem', fontWeight: 500, color: 'var(--gold)', marginBottom: '.25rem' }}>Scanner d'entrée</h2>
        <p className="wa-text-sm wa-text-muted">{cerName} · 4 juillet 2026</p>
      </div>

      <div className="wa-scanner-viewport" style={{ display: cameraOn ? 'block' : 'none', width: '100%' }}>
        <video ref={videoRef} autoPlay playsInline muted />
        <div className="wa-scanner-frame-overlay"><div className="wa-scanner-frame"/></div>
      </div>
      <canvas ref={canvasRef} style={{ display: 'none' }}/>

      {!cameraOn && !result && (
        <button className="wa-btn wa-w-full" style={{ padding: '.875rem', fontSize: '15px' }} onClick={startCamera}>
          📷 Activer la caméra
        </button>
      )}
      {cameraOn && (
        <button className="wa-btn wa-btn-secondary wa-w-full" onClick={stopCamera}>Arrêter la caméra</button>
      )}

      {!result && (
        <div style={{ width: '100%' }}>
          <label className="wa-label">Saisie manuelle du code</label>
          <div className="wa-flex wa-gap-sm" style={{ marginTop: '.375rem' }}>
            <input className="wa-input" placeholder="WA-V-G001-2026.abc123…" value={manual} onChange={e => setManual(e.target.value)} onKeyDown={e => e.key === 'Enter' && manual.trim() && handleToken(manual.trim())} />
            <button className="wa-btn" style={{ flexShrink: 0 }} disabled={!manual.trim() || loading} onClick={() => handleToken(manual.trim())}>Vérifier</button>
          </div>
        </div>
      )}

      {loading && <div style={{ color: 'var(--muted)', fontSize: '13px', textAlign: 'center' }}><div className="wa-loader" style={{ margin: '0 auto .5rem' }}/> Vérification…</div>}

      {result && !loading && (
        <div className={`wa-scan-result ${result.state === 'done' ? 'wa-scan-valid' : result.state === 'verify' ? 'wa-scan-valid' : result.state === 'used' ? 'wa-scan-used' : 'wa-scan-invalid'} wa-w-full`}>
          {result.state === 'verify' && <>
            <h3>✓ Invité identifié</h3>
            {result.guest && (
              <p style={{ marginBottom: '.75rem' }}>
                <strong>{result.guest.primaryName}</strong>
                {result.guest.companionName && <> & {result.guest.companionName}</>}<br/>
                {result.guest.tableName && <>Table : {result.guest.tableName}<br/></>}
                Statut : <strong>{result.guest.entryStatus === 'NOT_ARRIVED' ? 'En attente' : result.guest.entryStatus === 'ARRIVED' ? 'Arrivé' : result.guest.entryStatus}</strong>
              </p>
            )}
            <div className="wa-flex wa-gap-sm">
              <button className="wa-btn" onClick={confirmEntry} disabled={loading}>✓ Valider l'entrée</button>
              <button className="wa-btn wa-btn-ghost" onClick={reset}>Annuler</button>
            </div>
          </>}
          {result.state === 'done' && <>
            <h3>🎉 Entrée validée !</h3>
            {result.guest && <p><strong>{result.guest.primaryName}</strong> — Bienvenue !</p>}
            <button className="wa-btn" style={{ marginTop: '.75rem' }} onClick={reset}>Scanner suivant</button>
          </>}
          {result.state === 'invalid' && <>
            <h3>✗ Accès refusé</h3>
            <p>{result.message || 'QR code invalide ou inconnu'}</p>
            <button className="wa-btn wa-btn-ghost" style={{ marginTop: '.75rem' }} onClick={reset}>Réessayer</button>
          </>}
          {result.state === 'used' && <>
            <h3>⚠ Déjà enregistré</h3>
            {result.guest && <p><strong>{result.guest.primaryName}</strong> est déjà arrivé(e).</p>}
            <button className="wa-btn wa-btn-ghost" style={{ marginTop: '.75rem' }} onClick={reset}>OK</button>
          </>}
        </div>
      )}
    </div>
  );
}

/* ── HISTORY ────────────────────────────────────── */
function HistoryScreen({ user, ceremonies, showToast }) {
  const [scans, setScans] = useState([]);
  const [loading, setLoading] = useState(true);
  const [cFilter, setCFilter] = useState(user.role === 'SUPER_ADMIN' ? '' : (user.ceremonyId || ''));
  const [page, setPage] = useState(1);
  const [totalPages, setTotalPages] = useState(1);

  const load = (cId = cFilter, p = page) => {
    setLoading(true);
    api.scans.history(cId, p).then(r => {
      const data = Array.isArray(r) ? r : (r.data || r.items || []);
      setScans(data);
      if (r.pages) setTotalPages(r.pages);
    }).catch(() => {}).finally(() => setLoading(false));
  };

  useEffect(() => { load(); }, []);

  const resultBadge = (r) => {
    const m = { OK: 'wa-badge-success', ALREADY_SCANNED: 'wa-badge-warning', INVALID_TOKEN: 'wa-badge-danger', WRONG_CEREMONY: 'wa-badge-danger', VALID: 'wa-badge-success', INVALID: 'wa-badge-danger', ALREADY_USED: 'wa-badge-warning' };
    const l = { OK: 'Valide', ALREADY_SCANNED: 'Déjà scanné', INVALID_TOKEN: 'Invalide', WRONG_CEREMONY: 'Mauvaise cérémonie', VALID: 'Valide', INVALID: 'Invalide', ALREADY_USED: 'Déjà utilisé' };
    return <span className={`wa-badge ${m[r] || 'wa-badge-muted'}`}>{l[r] || r}</span>;
  };

  const isSA = user.role === 'SUPER_ADMIN';

  return (
    <div>
      <div className="wa-filter-bar wa-mb">
        {isSA && ceremonies.length > 0 && (
          <select className="wa-select" style={{ width: 'auto' }} value={cFilter} onChange={e => { setCFilter(e.target.value); setPage(1); load(e.target.value, 1); }}>
            <option value="">Toutes</option>
            {ceremonies.map(c => <option key={c.id} value={c.id}>{c.name || CEREMONY_NAMES[c.type]}</option>)}
          </select>
        )}
        <button className="wa-btn wa-btn-secondary" onClick={() => load()}>↻ Actualiser</button>
      </div>
      <div className="wa-card" style={{ padding: 0, overflow: 'hidden' }}>
        <div className="wa-table-wrap">
          <table className="wa-table">
            <thead><tr>
              <th>Heure</th>
              <th>Invité</th>
              <th>Cérémonie</th>
              <th>Résultat</th>
              <th>Agent</th>
            </tr></thead>
            <tbody>
              {loading && <tr><td colSpan="5" style={{ textAlign: 'center', padding: '2rem' }}><div className="wa-loader" style={{ margin: '0 auto' }}/></td></tr>}
              {!loading && scans.length === 0 && <tr><td colSpan="5"><div className="wa-empty">Aucun scan enregistré</div></td></tr>}
              {scans.map((s, i) => {
                const cer = ceremonies.find(c => c.id === s.ceremonyId);
                const guestName = s.guest ? (s.guest.primaryName || `${s.guest.firstName || ''} ${s.guest.lastName || ''}`.trim()) : '—';
                return (
                  <tr key={s.id || i}>
                    <td style={{ whiteSpace: 'nowrap', fontSize: '12px' }}>{new Date(s.scannedAt || s.createdAt).toLocaleString('fr-FR')}</td>
                    <td>{guestName}</td>
                    <td>{cer ? <CeremonyBadge type={cer.type} /> : (s.ceremonyName || '—')}</td>
                    <td>{resultBadge(s.result)}</td>
                    <td className="wa-text-muted wa-text-xs">{s.scannedBy?.email || s.agent?.email || '—'}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        {totalPages > 1 && (
          <div className="wa-flex" style={{ justifyContent: 'center', gap: '.5rem', padding: '.75rem', borderTop: '1px solid var(--border)' }}>
            <button className="wa-btn wa-btn-ghost wa-btn-sm" disabled={page <= 1} onClick={() => { setPage(p => p - 1); load(cFilter, page - 1); }}>← Préc</button>
            <span className="wa-text-sm wa-text-muted">Page {page} / {totalPages}</span>
            <button className="wa-btn wa-btn-ghost wa-btn-sm" disabled={page >= totalPages} onClick={() => { setPage(p => p + 1); load(cFilter, page + 1); }}>Suiv →</button>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── USERS ──────────────────────────────────────── */
function UserModal({ userData, onClose, onSaved, ceremonies }) {
  const editing = !!userData?.id;
  const [form, setForm] = useState({
    email: userData?.email || '',
    firstName: userData?.firstName || '',
    lastName: userData?.lastName || '',
    password: '',
    role: userData?.role || 'AGENT_VIN_HONNEUR',
    ceremonyId: userData?.ceremonyId || (ceremonies[0]?.id || ''),
  });
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  async function submit(ev) {
    ev.preventDefault(); setErr(''); setBusy(true);
    try {
      const payload = { ...form };
      if (editing && !payload.password) delete payload.password;
      if (editing) await api.users.update(userData.id, payload);
      else await api.users.create(payload);
      onSaved();
    } catch (e) { setErr(e.message); }
    finally { setBusy(false); }
  }

  return (
    <Modal title={editing ? 'Modifier l\'utilisateur' : 'Nouvel utilisateur'} onClose={onClose}
      footer={<>
        <button className="wa-btn wa-btn-secondary" onClick={onClose} type="button">Annuler</button>
        <button className="wa-btn" form="user-form" type="submit" disabled={busy}>{busy ? '…' : editing ? 'Enregistrer' : 'Créer'}</button>
      </>}>
      <form id="user-form" onSubmit={submit}>
        <div className="wa-form-row wa-form-row-2">
          <div className="wa-form-group" style={{ margin: 0 }}>
            <label className="wa-label">Prénom *</label>
            <input className="wa-input" value={form.firstName} onChange={e => set('firstName', e.target.value)} required />
          </div>
          <div className="wa-form-group" style={{ margin: 0 }}>
            <label className="wa-label">Nom *</label>
            <input className="wa-input" value={form.lastName} onChange={e => set('lastName', e.target.value)} required />
          </div>
        </div>
        <div className="wa-form-group" style={{ marginTop: '.75rem' }}>
          <label className="wa-label">E-mail *</label>
          <input className="wa-input" type="email" value={form.email} onChange={e => set('email', e.target.value)} required />
        </div>
        <div className="wa-form-group">
          <label className="wa-label">{editing ? 'Nouveau mot de passe (vide = inchangé)' : 'Mot de passe *'}</label>
          <input className="wa-input" type="password" value={form.password} onChange={e => set('password', e.target.value)} required={!editing} />
        </div>
        <div className="wa-form-row wa-form-row-2">
          <div className="wa-form-group" style={{ margin: 0 }}>
            <label className="wa-label">Rôle</label>
            <select className="wa-select" value={form.role} onChange={e => set('role', e.target.value)}>
              {Object.entries(ROLE_LABELS).map(([v, l]) => <option key={v} value={v}>{l}</option>)}
            </select>
          </div>
          <div className="wa-form-group" style={{ margin: 0 }}>
            <label className="wa-label">Cérémonie</label>
            <select className="wa-select" value={form.ceremonyId} onChange={e => set('ceremonyId', e.target.value)}>
              <option value="">Toutes</option>
              {ceremonies.map(c => <option key={c.id} value={c.id}>{c.name || CEREMONY_NAMES[c.type]}</option>)}
            </select>
          </div>
        </div>
        {err && <div className="wa-form-error">{err}</div>}
      </form>
    </Modal>
  );
}

function UsersScreen({ user, showToast }) {
  const [users, setUsers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [ceremonies, setCeremonies] = useState([]);
  const [showAdd, setShowAdd] = useState(false);
  const [editUser, setEditUser] = useState(null);
  const [delUser, setDelUser] = useState(null);

  const load = () => {
    setLoading(true);
    Promise.all([api.users.list(), api.ceremonies.list()]).then(([u, c]) => { setUsers(u || []); setCeremonies(c || []); }).catch(() => {}).finally(() => setLoading(false));
  };

  useEffect(() => { load(); }, []);

  const handleDelete = async () => {
    await api.users.delete(delUser.id);
    showToast('Utilisateur supprimé', 'success');
    load();
  };

  return (
    <div>
      {(showAdd || editUser) && (
        <UserModal
          userData={editUser}
          ceremonies={ceremonies}
          onClose={() => { setShowAdd(false); setEditUser(null); }}
          onSaved={() => { setShowAdd(false); setEditUser(null); showToast('Utilisateur enregistré', 'success'); load(); }}
        />
      )}
      {delUser && (
        <ConfirmModal title="Supprimer l'utilisateur" message={`Supprimer "${delUser.firstName} ${delUser.lastName}" ?`} danger onConfirm={handleDelete} onClose={() => setDelUser(null)} />
      )}
      <div className="wa-flex-between wa-mb-sm">
        <span className="wa-text-muted wa-text-sm">{users.length} utilisateur{users.length !== 1 ? 's' : ''}</span>
        <button className="wa-btn" onClick={() => setShowAdd(true)}>+ Nouvel utilisateur</button>
      </div>
      <div className="wa-card" style={{ padding: 0, overflow: 'hidden' }}>
        <div className="wa-table-wrap">
          <table className="wa-table">
            <thead><tr><th>Nom</th><th>E-mail</th><th>Rôle</th><th>Statut</th><th>Actions</th></tr></thead>
            <tbody>
              {loading && <tr><td colSpan="5" style={{ textAlign: 'center', padding: '2rem' }}><div className="wa-loader" style={{ margin: '0 auto' }}/></td></tr>}
              {!loading && users.length === 0 && <tr><td colSpan="5"><div className="wa-empty">Aucun utilisateur</div></td></tr>}
              {users.map(u => (
                <tr key={u.id}>
                  <td style={{ fontWeight: 500 }}>{u.firstName} {u.lastName}</td>
                  <td className="wa-text-sm">{u.email}</td>
                  <td><span className="wa-badge wa-badge-info">{ROLE_LABELS[u.role] || u.role}</span></td>
                  <td><span className={`wa-badge ${u.isActive !== false ? 'wa-badge-success' : 'wa-badge-muted'}`}>{u.isActive !== false ? 'Actif' : 'Inactif'}</span></td>
                  <td style={{ whiteSpace: 'nowrap' }}>
                    <button className="wa-btn wa-btn-ghost wa-btn-sm" onClick={() => setEditUser(u)}>Modifier</button>
                    <button className="wa-btn wa-btn-ghost wa-btn-sm" style={{ marginLeft: '.375rem', color: 'var(--danger)' }} onClick={() => setDelUser(u)}>×</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ── SIDEBAR & TOPBAR ───────────────────────────── */
const NAV_ITEMS = [
  { id: 'dashboard',   label: 'Tableau de bord', icon: '◈', roles: ['SUPER_ADMIN', 'ADMIN_VIN_HONNEUR', 'ADMIN_DINER'] },
  { id: 'guests',      label: 'Invités',          icon: '◉', roles: ['SUPER_ADMIN', 'ADMIN_VIN_HONNEUR', 'ADMIN_DINER'] },
  { id: 'qr',          label: 'QR Codes',         icon: '⬡', roles: ['SUPER_ADMIN', 'ADMIN_VIN_HONNEUR', 'ADMIN_DINER'] },
  { id: 'invitations', label: 'Invitations',      icon: '✉', roles: ['SUPER_ADMIN', 'ADMIN_VIN_HONNEUR', 'ADMIN_DINER'] },
  { id: 'templates',   label: 'Modèles PDF',      icon: '📄', roles: ['SUPER_ADMIN', 'ADMIN_VIN_HONNEUR', 'ADMIN_DINER'] },
  { id: 'seating',     label: 'Plan de table',    icon: '⊞', roles: ['SUPER_ADMIN', 'ADMIN_VIN_HONNEUR', 'ADMIN_DINER'] },
  { id: 'scanner',     label: 'Scanner QR',       icon: '📷', roles: ['SUPER_ADMIN', 'ADMIN_VIN_HONNEUR', 'ADMIN_DINER', 'AGENT_VIN_HONNEUR', 'AGENT_DINER'] },
  { id: 'history',     label: 'Historique scans', icon: '◷', roles: ['SUPER_ADMIN', 'ADMIN_VIN_HONNEUR', 'ADMIN_DINER'] },
  { id: 'branding',    label: 'Branding',         icon: '◎', roles: ['SUPER_ADMIN'] },
  { id: 'users',       label: 'Utilisateurs',     icon: '👤', roles: ['SUPER_ADMIN'] },
];

const PAGE_TITLES = Object.fromEntries(NAV_ITEMS.map(n => [n.id, n.label]));

function Sidebar({ user, page, setPage, branding, sidebarOpen, setSidebarOpen }) {
  const visible = NAV_ITEMS.filter(n => n.roles.includes(user.role));

  return (
    <aside className={`wa-sidebar${sidebarOpen ? ' open' : ''}`}>
      <div className="wa-sidebar-header">
        <div className="wa-sidebar-monogram">
          <WeddingMonogram size={40} />
          <div className="wa-sidebar-titles">
            <h2>{branding?.appName || 'Wedding Access'}</h2>
            <p>{branding?.coupleNames || 'M & J'} · {branding?.eventDate ? new Date(branding.eventDate).getFullYear() : '2026'}</p>
          </div>
        </div>
      </div>
      <nav className="wa-nav">
        {visible.map(item => (
          <button key={item.id} className={`wa-nav-item${page === item.id ? ' active' : ''}`} onClick={() => { setPage(item.id); setSidebarOpen(false); }}>
            <span style={{ fontSize: '14px', width: '18px', textAlign: 'center', flexShrink: 0 }}>{item.icon}</span>
            {item.label}
          </button>
        ))}
      </nav>
      <div className="wa-sidebar-footer">
        <div className="wa-sidebar-user">
          <div style={{ width: 28, height: 28, borderRadius: '50%', background: 'var(--gold)', color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '11px', fontWeight: 600, flexShrink: 0 }}>
            {(user.firstName?.[0] || user.email?.[0] || '?').toUpperCase()}
          </div>
          <div>
            <div className="wa-sidebar-user-name">{user.firstName ? `${user.firstName} ${user.lastName || ''}`.trim() : user.email}</div>
            <div className="wa-sidebar-user-role">{ROLE_LABELS[user.role] || user.role}</div>
          </div>
        </div>
      </div>
    </aside>
  );
}

function Topbar({ user, page, onLogout, onMenuToggle }) {
  const [theme, setTheme] = useState(() => {
    const saved = localStorage.getItem('wa_theme');
    return saved || getAutoTheme();
  });

  useEffect(() => { applyTheme(theme); }, [theme]);

  const toggleTheme = () => {
    const next = theme === 'night' ? 'day' : 'night';
    setTheme(next);
    localStorage.setItem('wa_theme', next);
  };

  return (
    <header className="wa-topbar">
      <button className="wa-topbar-menu" onClick={onMenuToggle}>☰</button>
      <span className="wa-topbar-title">{PAGE_TITLES[page] || 'Wedding Access'}</span>
      <button className="wa-btn wa-btn-ghost wa-btn-sm" onClick={toggleTheme} title="Thème">{theme === 'night' ? '☀' : '☽'}</button>
      <button className="wa-btn wa-btn-ghost wa-btn-sm" onClick={onLogout}>Déconnexion</button>
    </header>
  );
}

/* ── APP ROOT ───────────────────────────────────── */
function App() {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);
  const [page, setPage] = useState('dashboard');
  const [ceremonies, setCeremonies] = useState([]);
  const [branding, setBranding] = useState(null);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [toast, setToast] = useState(null);
  const toastRef = useRef(null);

  const showToast = useCallback((msg, type = 'success') => {
    clearTimeout(toastRef.current);
    setToast({ msg, type });
    toastRef.current = setTimeout(() => setToast(null), 3500);
  }, []);

  const doLogout = useCallback(() => {
    api.auth.logout();
    setUser(null); setCeremonies([]); setBranding(null); setPage('dashboard');
  }, []);

  useEffect(() => {
    window.addEventListener('wa:logout', doLogout);
    return () => window.removeEventListener('wa:logout', doLogout);
  }, [doLogout]);

  useEffect(() => {
    // Apply saved theme immediately
    const saved = localStorage.getItem('wa_theme');
    applyTheme(saved || getAutoTheme());

    if (!_token) { setLoading(false); return; }
    api.auth.me().then(async u => {
      setUser(u);
      const isAgent = u.role === 'AGENT_VIN_HONNEUR' || u.role === 'AGENT_DINER';
      if (isAgent) setPage('scanner');
      const [cers, br] = await Promise.all([
        api.ceremonies.list().catch(() => []),
        api.branding.get().catch(() => null),
      ]);
      setCeremonies(cers || []);
      setBranding(br);
    }).catch(() => { setToken(null); }).finally(() => setLoading(false));
  }, []);

  if (loading) return <div className="wa-boot">Wedding Access</div>;

  if (!user) return (
    <LoginScreen
      branding={branding}
      onLogin={async (u) => {
        setUser(u);
        const isAgent = u.role === 'AGENT_VIN_HONNEUR' || u.role === 'AGENT_DINER';
        setPage(isAgent ? 'scanner' : 'dashboard');
        const [cers, br] = await Promise.all([
          api.ceremonies.list().catch(() => []),
          api.branding.get().catch(() => null),
        ]);
        setCeremonies(cers || []);
        setBranding(br);
      }}
    />
  );

  const isAgent = user.role === 'AGENT_VIN_HONNEUR' || user.role === 'AGENT_DINER';

  return (
    <div className="wa-layout">
      {sidebarOpen && <div className="wa-sidebar-overlay" onClick={() => setSidebarOpen(false)} style={{ display: 'block' }} />}
      <Sidebar user={user} page={page} setPage={setPage} branding={branding} sidebarOpen={sidebarOpen} setSidebarOpen={setSidebarOpen} />
      <div className="wa-main">
        <Topbar user={user} page={page} onLogout={doLogout} onMenuToggle={() => setSidebarOpen(s => !s)} />
        <div className="wa-page">
          {page === 'dashboard'   && <DashboardScreen user={user} ceremonies={ceremonies} showToast={showToast} />}
          {page === 'guests'      && <GuestsScreen user={user} ceremonies={ceremonies} showToast={showToast} />}
          {page === 'qr'          && <QRScreen user={user} ceremonies={ceremonies} showToast={showToast} />}
          {page === 'invitations' && <InvitationsScreen user={user} ceremonies={ceremonies} showToast={showToast} />}
          {page === 'templates'   && <TemplatesScreen user={user} ceremonies={ceremonies} showToast={showToast} />}
          {page === 'branding'    && <BrandingScreen user={user} branding={branding} setBranding={setBranding} showToast={showToast} />}
          {page === 'seating'     && <SeatingScreen user={user} ceremonies={ceremonies} showToast={showToast} />}
          {page === 'scanner'     && <ScannerScreen user={user} showToast={showToast} />}
          {page === 'history'     && <HistoryScreen user={user} ceremonies={ceremonies} showToast={showToast} />}
          {page === 'users'       && <UsersScreen user={user} showToast={showToast} />}
        </div>
      </div>
      {toast && <div className={`wa-toast wa-toast-${toast.type}`}>{toast.msg}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
