version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wedding_access}
      POSTGRES_USER: ${POSTGRES_USER:-wa_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wa_user} -d ${POSTGRES_DB:-wedding_access}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-wa_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-wedding_access}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      QR_SECRET: ${QR_SECRET:?QR_SECRET is required}
      STORAGE_PATH: /app/storage
      PORT: 3000
    volumes:
      - storage_data:/app/storage
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/auth/me',r=>process.exit(r.statusCode===401?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db_data:
  storage_data:
